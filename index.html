<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- Настройки "Режима Проги" -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="HUB">
    
    <title>HUB</title>
    
    <!-- СТИЛЬНАЯ ИКОНКА (Черный фон + белый логотип) -->
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com">

    <style>
        :root {
            --bg: #000000;
            --card-bg: #111111;
            --accent: #ffffff;
            --danger: #ff4d4d;
            --border: #222222;
            --text: #ffffff;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); color: var(--text); 
            margin: 0; padding: 60px 20px 40px;
            -webkit-tap-highlight-color: transparent;
        }

        .container { max-width: 600px; margin: auto; }

        .card { 
            background: var(--card-bg); padding: 20px; border-radius: 16px; 
            margin-bottom: 25px; border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { margin: 0 0 15px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; color: #555; }

        .progress-bar { height: 2px; background: #222; margin: 15px 0; border-radius: 2px; }
        .progress-fill { height: 100%; background: #fff; width: 0%; transition: 0.8s ease; box-shadow: 0 0 10px #fff; }

        table { width: 100%; border-collapse: collapse; }
        td { padding: 10px 5px; border-bottom: 1px solid #1a1a1a; }

        input, select { 
            background: #080808; border: 1px solid #222; color: #fff; 
            padding: 10px; border-radius: 8px; width: 100%; font-size: 16px;
        }
        input[type="checkbox"] { width: 22px; height: 22px; accent-color: #fff; }

        .btn { 
            background: #fff; color: #000; padding: 14px; border: none; 
            border-radius: 10px; font-weight: 800; font-size: 12px;
            text-transform: uppercase; cursor: pointer; width: 100%; margin-top: 15px;
        }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .stat-item { background: #080808; padding: 15px; border-radius: 12px; border: 1px solid #1a1a1a; text-align: center; }
        .stat-item label { font-size: 10px; color: #555; display: block; margin-bottom: 5px; }
        .stat-item span { font-size: 18px; font-weight: bold; }

        .row-done { opacity: 0.3; filter: grayscale(1); }

        /* Кнопки управления вверху */
        .top-actions { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-small { background: #222; color: #fff; padding: 8px; font-size: 10px; flex: 1; }
    </style>
</head>
<body>

<div class="container">
    <div class="top-actions">
        <button class="btn btn-small" onclick="archiveWeek()">ЗАКРИТИ ТИЖДЕНЬ</button>
        <button class="btn btn-small" style="color:red" onclick="clearAll()">ВИДАЛИТИ ВСЕ</button>
    </div>

    <div class="card">
        <h2>ЗАДАЧІ</h2>
        <div class="progress-bar"><div id="pFill" class="progress-fill"></div></div>
        <table id="tTable"></table>
        <button class="btn" onclick="addT()">+ ДОДАТИ ЗАДАЧУ</button>
    </div>

    <div class="card">
        <h2>ФІНАНСИ</h2>
        <table id="fTable"></table>
        <button class="btn" onclick="addF()">+ ДОДАТИ ЗАПИС</button>
        <div class="stats-grid">
            <div class="stat-item">
                <label>БОРГ</label>
                <input type="number" id="baseDebt" value="0" oninput="calc()" style="border:none; text-align:center; font-size:20px;">
            </div>
            <div class="stat-item">
                <label>ЗАЛИШОК</label>
                <span id="debtLeft">0</span>
            </div>
        </div>
    </div>
</div>

<script>
function addT(d={v1:'', v4:false}) {
    const r = document.getElementById('tTable').insertRow();
    if(d.v4) r.className = 'row-done';
    r.innerHTML = `
        <td style="width:85%"><input type="text" placeholder="..." value="${d.v1}" oninput="save()"></td>
        <td align="right"><input type="checkbox" ${d.v4?'checked':''} onchange="this.parentElement.parentElement.classList.toggle('row-done', this.checked); calc()"></td>
    `;
    save();
}

function addF(d={v1:'debt', v2:''}) {
    const r = document.getElementById('fTable').insertRow();
    r.innerHTML = `
        <td style="width:30%"><select class="ft" onchange="calc()">
            <option value="debt" ${d.v1==='debt'?'selected':''}>БОРГ</option>
            <option value="in" ${d.v1==='in'?'selected':''}>+</option>
            <option value="out" ${d.v1==='out'?'selected':''}>-</option>
        </select></td>
        <td><input type="number" class="fv" placeholder="Сума" value="${d.v2}" oninput="calc()"></td>
    `;
    save();
}

function calc() {
    const tasks = document.querySelectorAll('#tTable input[type="checkbox"]');
    const done = Array.from(tasks).filter(t => t.checked).length;
    document.getElementById('pFill').style.width = (tasks.length ? (done/tasks.length*100) : 0) + '%';

    let paid = 0;
    document.querySelectorAll('#fTable tr').forEach(r => {
        if(r.querySelector('.ft').value === 'debt') paid += parseFloat(r.querySelector('.fv').value) || 0;
    });

    const base = parseFloat(document.getElementById('baseDebt').value) || 0;
    document.getElementById('debtLeft').innerText = (base - paid).toLocaleString() + ' ₴';
    save();
}

function save() {
    const data = {
        base: document.getElementById('baseDebt').value,
        t: Array.from(document.querySelectorAll('#tBody tr')).map(r => ({
            v1: r.querySelector('input').value,
            v4: r.querySelector('input[type="checkbox"]').checked
        })),
        f: Array.from(document.querySelectorAll('#fBody tr')).map(r => ({
            v1: r.querySelector('.ft').value,
            v2: r.querySelector('.fv').value
        }))
    };
    localStorage.setItem('hub_vfinal', JSON.stringify(data));
}

function archiveWeek() { if(confirm('Архівувати тиждень?')) { location.reload(); } }
function clearAll() { if(confirm('Видалити все?')) { localStorage.clear(); location.reload(); } }

window.onload = () => {
    const s = JSON.parse(localStorage.getItem('hub_vfinal'));
    if(s) document.getElementById('baseDebt').value = s.base;
    addT(); addF(); calc();
}
</script>
</body>
</html>
