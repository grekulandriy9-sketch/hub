<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <!-- Налаштування "Режиму Проги" (прибирає браузер) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    
    <title>HUB</title>
    
    <!-- СТИЛЬНА ІКОНКА (Білий логотип на чорному) -->
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com">

    <style>
        :root {
            --bg: #000000; --card-bg: #111111; --accent: #ffffff;
            --danger: #ff4d4d; --success: #00ff88; --border: #222222; --text: #ffffff;
        }
        body { 
            font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); 
            margin: 0; padding: 50px 20px 20px; /* Відступ під статус-бар телефону */
        }
        .container { max-width: 800px; margin: auto; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 20px; }
        .btn { background: #fff; color: #000; padding: 12px; border-radius: 8px; border: none; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }
        input, select { background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .progress-bar { height: 2px; background: #222; margin: 15px 0; }
        .progress-fill { height: 100%; background: #fff; width: 0%; box-shadow: 0 0 10px #fff; }
        .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .stat-item { background: #050505; padding: 10px; border-radius: 10px; border: 1px solid #111; text-align: center; }
        .stat-item label { font-size: 9px; color: #555; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2 style="font-size: 14px; text-transform: uppercase;">Завдання</h2>
        <div class="progress-bar"><div id="pFill" class="progress-fill"></div></div>
        <table id="tTable" style="width:100%"></table>
        <button class="btn" onclick="addT()">+ Додати</button>
    </div>
    <div class="card">
        <h2 style="font-size: 14px; text-transform: uppercase;">Фінанси</h2>
        <table id="fTable" style="width:100%"></table>
        <button class="btn" onclick="addF()">+ Запис</button>
        <div class="stat-grid">
            <div class="stat-item"><label>БОРГ</label><input type="number" id="bD" value="0" oninput="calc()" style="border:none; text-align:center;"></div>
            <div class="stat-item"><label>ЗАЛИШОК</label><span id="sL">0</span></div>
        </div>
    </div>
</div>
<script>
function addT(){ let r=document.getElementById('tTable').insertRow(); r.innerHTML='<td><input type="text" oninput="save()"></td><td><input type="checkbox" onchange="calc()"></td>'; save(); }
function addF(){ let r=document.getElementById('fTable').insertRow(); r.innerHTML='<td><select onchange="calc()"><option value="in">+</option><option value="debt">Борг</option></select></td><td><input type="number" class="v" oninput="calc()"></td>'; save(); }
function calc(){ 
    let t=document.querySelectorAll('#tTable input[type="checkbox"]'), d=Array.from(t).filter(x=>x.checked).length;
    document.getElementById('pFill').style.width=(t.length?(d/t.length*100):0)+'%';
    let base=parseFloat(document.getElementById('bD').value)||0, paid=0;
    document.querySelectorAll('#fTable tr').forEach(r=>{ if(r.querySelector('select').value==='debt') paid+=parseFloat(r.querySelector('.v').value)||0; });
    document.getElementById('sL').innerText=(base-paid); save();
}
function save(){ let data={ b:document.getElementById('bD').value }; localStorage.setItem('h_v5', JSON.stringify(data)); }
window.onload=()=>{ let s=JSON.parse(localStorage.getItem('h_v5')); if(s)document.getElementById('bD').value=s.b; addT(); addF(); calc(); }
</script>
</body>
</html>
